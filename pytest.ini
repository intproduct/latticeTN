[pytest]
# Default test collection is SCOPED to the formal tests/ directory only.
# Root-level legacy prototype scripts (archived under legacy/) and examples/
# must never be collected by a bare `pytest -q`. Stage score scripts select
# their own explicit test lists.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Keep the default run CPU-only and deterministic-friendly.
filterwarnings =
    ignore::UserWarning:torch
addopts = -q
